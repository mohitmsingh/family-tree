name: Deploy Family Tree

on:
  push:
    branches:
      - main
    paths:
      - 'data/family.yaml'
      - 'scripts/generate_tree.py'
      - 'web/**'
      - 'photos/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install pyyaml

      - name: Validate YAML
        run: |
          python scripts/validate_yaml.py

      - name: Generate Tree Data
        run: |
          python scripts/generate_tree.py

      - name: Build Site
        run: |

          mkdir site

          cp -r web/* site/
          cp -r photos site/
          cp -r generated site/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    needs: build

    steps:

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4